# EpicTrails – Trail Styles & Particle Types
# Each style entry defines display metadata and which particles are available.
# The 'particles' section lists all particle types the plugin recognises,
# with display metadata for the GUI.

styles:
  SPIRAL:
    display-name: "<gradient:#ff6b35:#ffd700>Spiral</gradient>"
    description:
      - "<gray>Particles form a graceful"
      - "<gray>helical spiral as you walk."
    icon: BLAZE_ROD
    permission: epictrails.style.spiral

  DOUBLE_HELIX:
    display-name: "<gradient:#7b2fff:#ff6b35>Double Helix</gradient>"
    description:
      - "<gray>Two interleaved helices"
      - "<gray>twist around your path."
    icon: NAUTILUS_SHELL
    permission: epictrails.style.double_helix

  ORBIT:
    display-name: "<gradient:#00cfff:#7b2fff>Orbit</gradient>"
    description:
      - "<gray>Particles orbit around you"
      - "<gray>in a continuous ring."
    icon: ENDER_EYE
    permission: epictrails.style.orbit

  PULSE:
    display-name: "<gradient:#ff4fd8:#ff6b35>Pulse</gradient>"
    description:
      - "<gray>A pulsing sphere of particles"
      - "<gray>radiates from your body."
    icon: MAGMA_CREAM
    permission: epictrails.style.pulse

  FLAME:
    display-name: "<gradient:#ff6b35:#ffcc00>Flame</gradient>"
    description:
      - "<gray>Rising embers and flames"
      - "<gray>erupt from your feet."
    icon: FIRE_CHARGE
    permission: epictrails.style.flame

  WING:
    display-name: "<gradient:#ffffff:#00cfff>Wing</gradient>"
    description:
      - "<gray>Sweeping wings of particles"
      - "<gray>spread from your shoulders."
    icon: FEATHER
    permission: epictrails.style.wing

  COMET:
    display-name: "<gradient:#ffd700:#ffffff>Comet</gradient>"
    description:
      - "<gray>A blazing comet tail"
      - "<gray>streams behind you."
    icon: NETHER_STAR
    permission: epictrails.style.comet

  ENCHANT:
    display-name: "<gradient:#4b0082:#9b59b6>Enchant</gradient>"
    description:
      - "<gray>Mystical runes and sparkles"
      - "<gray>swirl around your form."
    icon: ENCHANTED_BOOK
    permission: epictrails.style.enchant

  VORTEX:
    display-name: "<gradient:#00ffab:#00cfff>Vortex</gradient>"
    description:
      - "<gray>A swirling vortex of energy"
      - "<gray>surrounds you at all times."
    icon: LIGHTNING_ROD
    permission: epictrails.style.vortex

